<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CryptoLab — 本地编码、摘要、加解密、JWT 检查与公钥二维码安全分享工具。"
    />
    <meta name="theme-color" content="#303446" />
    <meta property="og:title" content="CryptoLab · 本地密码学与安全分享工具" />
    <meta
      property="og:description"
      content="纯前端编码、摘要、AES、RSA、JWT 与公钥二维码安全分享。"
    />
    <meta property="og:type" content="website" />
    <title>CryptoLab · 本地密码学与安全分享工具</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('toolbox-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light' : 'dark'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
