name: CI & Deploy

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: '1'

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Public: runs on every push/PR, zero secrets needed ──
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm check:privacy
      - run: pnpm check:contracts
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint

  # ── Deploy: only on push to main, after tests pass ──
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          set -eu
          HOST="${{ secrets.VPS_HOST }}"
          USER="${{ secrets.VPS_USER }}"
          PORT="${{ secrets.VPS_PORT }}"
          WWW="${{ secrets.VPS_WWW }}"

          SSH_OPTS="-i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o LogLevel=ERROR"
          export RSYNC_RSH="ssh $SSH_OPTS"

          # Ensure target dir exists
          ssh $SSH_OPTS $USER@$HOST "mkdir -p $WWW"

          # Homepage owns the site root; every app deploys a verified build.
          rsync -az --delete --no-motd \
            apps/homepage/dist/ $USER@$HOST:$WWW/
          rsync -az --delete --no-motd \
            apps/monitor-choice/dist/ $USER@$HOST:$WWW/monitor-choice/

          # React apps (built dist/)
          for app in rate-lens chrono-sphere sane-units; do
            rsync -az --delete --no-motd \
              apps/$app/dist/ $USER@$HOST:$WWW/$app/
          done

          echo "::notice::Deploy complete — https://tools.s-ark.xyz"
