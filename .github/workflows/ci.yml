name: CI & Manual Deploy

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: '1'

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Deploy the selected main commit to production after all checks pass'
        required: true
        type: boolean
        default: false

jobs:
  # ── Public: runs on every push/PR, zero secrets needed ──
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm check:privacy
      - run: pnpm check:contracts
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@toolbox/monitor-choice exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:browser
      - run: pnpm lint

  # ── Deploy: explicit manual action on main, after tests pass ──
  deploy:
    needs: build-and-test
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      inputs.deploy_production == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3.3.0
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          set -eu
          HOST="${{ secrets.VPS_HOST }}"
          USER="${{ secrets.VPS_USER }}"
          PORT="${{ secrets.VPS_PORT }}"
          WWW="${{ secrets.VPS_WWW }}"

          SSH_OPTS="-i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o LogLevel=ERROR"
          export RSYNC_RSH="ssh $SSH_OPTS"

          # Ensure target dir exists
          ssh $SSH_OPTS $USER@$HOST "mkdir -p $WWW"

          # Homepage owns the site root; every app deploys a verified build.
          rsync -az --delete --no-motd \
            apps/homepage/dist/ $USER@$HOST:$WWW/
          rsync -az --delete --no-motd \
            apps/monitor-choice/dist/ $USER@$HOST:$WWW/monitor-choice/

          # React apps (built dist/)
          for app in rate-lens chrono-sphere sane-units image-converter; do
            rsync -az --delete --no-motd \
              apps/$app/dist/ $USER@$HOST:$WWW/$app/
          done

          echo "::notice::Deploy complete — https://tools.s-ark.xyz"
