name: CI & Manual Deploy

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: '1'

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Deploy the selected main commit to production after all checks pass'
        required: true
        type: boolean
        default: false
      deploy_target:
        description: 'Choose which production target receives the verified static site'
        required: true
        type: choice
        default: both
        options:
          - both
          - vps
          - pages

jobs:
  # ── Public: runs on every push/PR, zero secrets needed ──
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm check:privacy
      - run: pnpm check:contracts
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@toolbox/monitor-choice exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:browser
      - run: pnpm lint

      - name: Assemble verified static site
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main' &&
          inputs.deploy_production == true
        run: node scripts/assemble-static-site.mjs "${{ runner.temp }}/toolbox-static-site"

      - name: Upload verified static site
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main' &&
          inputs.deploy_production == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: toolbox-static-site-${{ github.sha }}
          path: ${{ runner.temp }}/toolbox-static-site
          if-no-files-found: error
          retention-days: 1

  # ── VPS: explicit manual action on main, using the verified artifact ──
  deploy-vps:
    needs: build-and-test
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      inputs.deploy_production == true &&
      (inputs.deploy_target == 'vps' || inputs.deploy_target == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    concurrency:
      group: production-vps-deploy
      cancel-in-progress: false
    steps:
      - name: Download verified static site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-static-site-${{ github.sha }}
          path: ${{ runner.temp }}/toolbox-static-site

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3.3.0
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          set -eu
          SITE_ROOT="${{ runner.temp }}/toolbox-static-site"

          SSH_OPTS="-i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o LogLevel=ERROR"
          export RSYNC_RSH="ssh $SSH_OPTS"

          # Ensure target dir exists
          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" "mkdir -p $VPS_WWW"

          # The artifact already contains the homepage and every stable app path.
          rsync -az --delete --no-motd \
            "$SITE_ROOT/" "$VPS_USER@$VPS_HOST:$VPS_WWW/"

          echo "::notice::VPS deploy complete"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_WWW: ${{ secrets.VPS_WWW }}

  # ── Cloudflare Pages: same verified artifact, no VPS connectivity ──
  deploy-pages:
    needs: build-and-test
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      inputs.deploy_production == true &&
      (inputs.deploy_target == 'pages' || inputs.deploy_target == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    concurrency:
      group: production-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download verified static site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolbox-static-site-${{ github.sha }}
          path: ${{ runner.temp }}/toolbox-static-site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.94.0'
          packageManager: npm
          quiet: true
          command: >-
            pages deploy ${{ runner.temp }}/toolbox-static-site
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
            --branch=main
